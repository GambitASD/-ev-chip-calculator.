<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Chip EV Calculator | Нижний Пул</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Quicksand', system-ui, -apple-system, 'Helvetica Neue', sans-serif;
        }
        /* Фон — ваша картинка, без размытия, ярко и чётко */
        body {
            margin: 0;
            min-height: 100vh;
            background-image: url('https://media.discordapp.net/attachments/1484570021999939654/1490652134314737674/IMG_5689.jpg?ex=69dd673b&is=69dc15bb&hm=188ac6767d5806b9c4fd6136b5717ffadbd467235d40d665dfeabc1fac98fa65&=&format=webp&width=510&height=680');
            background-size: contain;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            background-color: #f7b05e; /* тёплый цвет-запас */
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        /* Карточка — тёплая, полупрозрачная, но без агрессивного blur */
        .card {
            max-width: 750px;
            width: 100%;
            background: rgba(255, 235, 205, 0.88); /* персиково-кремовый */
            backdrop-filter: blur(2px);
            border-radius: 48px;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.2), 0 0 0 1px rgba(255, 200, 100, 0.6);
            overflow: hidden;
            transition: all 0.2s ease;
        }
        .header {
            background: #ffb347; /* тёплый апельсин */
            padding: 20px 20px 16px;
            text-align: center;
            color: #2d1b0c;
            border-bottom: 3px solid #ffe0a3;
        }
        .header h1 {
            margin: 0;
            font-size: 1.9rem;
            font-weight: 800;
            letter-spacing: 1px;
            text-shadow: 2px 2px 0 #ffe0a3;
        }
        .content {
            padding: 24px 20px 20px;
        }
        .limits-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 12px;
        }
        .limits-table th {
            text-align: center;
            font-weight: 700;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #b45f1b;
            padding-bottom: 8px;
        }
        .limits-table td {
            background: #fff6e8dd;
            border-radius: 28px;
            padding: 6px 10px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }
        .limit-badge {
            font-weight: 800;
            font-size: 1.4rem;
            text-align: center;
            background: #ffcf9a;
            border-radius: 50px;
            padding: 8px 0;
            width: 70px;
            display: inline-block;
            margin: 0 auto;
            color: #754e1f;
            box-shadow: inset 0 -1px 0 #ffb347, 0 2px 6px rgba(0,0,0,0.1);
        }
        .limit-cell {
            text-align: center;
            width: 90px;
        }
        .input-cell {
            width: auto;
        }
        input {
            width: 100%;
            padding: 14px 12px;
            font-size: 1rem;
            border: none;
            border-radius: 40px;
            background: #ffffffea;
            transition: 0.2s;
            text-align: center;
            font-weight: 600;
            color: #4a2a0e;
            box-shadow: inset 0 1px 3px #0001, 0 1px 2px #ffcd94;
        }
        input:focus {
            outline: none;
            background: #ffffff;
            box-shadow: 0 0 0 3px #ff9f4a;
        }
        input::placeholder {
            color: #c29a6b;
            font-weight: normal;
            font-size: 0.85rem;
        }
        .result-area {
            background: #ffebd0cc;
            border-radius: 48px;
            margin-top: 28px;
            padding: 20px;
            text-align: center;
            box-shadow: inset 0 1px 4px #ffcd94, 0 8px 16px rgba(0,0,0,0.1);
        }
        .result-label {
            font-size: 1rem;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 3px;
            color: #b45f1b;
            margin-bottom: 8px;
        }
        .result-value {
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Comic Neue', cursive, sans-serif;
            font-size: 2.6rem;
            font-weight: bold;
            color: #e67e22;
            background: #fff2e2;
            display: inline-block;
            padding: 10px 28px;
            border-radius: 60px;
            box-shadow: 0 5px 12px rgba(160, 80, 0, 0.2);
            margin-top: 6px;
        }
        .equiv-block {
            background: #fff0df;
            border-radius: 32px;
            padding: 10px 18px;
            margin-top: 18px;
            font-size: 0.95rem;
            font-weight: 600;
            color: #c5621a;
            display: inline-block;
            min-height: 48px;
        }
        .hypnotoad-block {
            margin-top: 24px;
            text-align: center;
        }
        .hypnotoad-title {
            font-size: 2rem;
            font-weight: 900;
            letter-spacing: 3px;
            color: #ffb347;
            text-shadow: 3px 3px 0 #633d12;
            background: #2c1a0acc;
            display: inline-block;
            padding: 12px 28px;
            border-radius: 60px;
            font-family: 'Impact', 'Segoe UI', sans-serif;
            backdrop-filter: blur(2px);
        }
        /* Полноэкранный оверлей для сообщений */
        .fullscreen-message {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            font-family: 'Comic Sans MS', 'Chalkboard SE', cursive;
            font-size: 3rem;
            font-weight: bold;
            text-align: center;
            color: #ffdd99;
            text-shadow: 6px 6px 0 #b45f1b;
            letter-spacing: 2px;
            animation: fadeIn 0.5s ease;
            pointer-events: none; /* чтобы клики проходили сквозь, но текст виден */
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @media (max-width: 600px) {
            .fullscreen-message { font-size: 1.8rem; padding: 20px; }
            .result-value { font-size: 1.8rem; }
            .hypnotoad-title { font-size: 1.4rem; }
        }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <h1>♠️ Покерный EV Калькулятор ♥️</h1>
    </div>
    <div class="content">
        <table class="limits-table">
            <thead>
                <tr><th>Лимит</th><th>Кол-во турниров</th><th>Chip EV / турнир</th></tr>
            </thead>
            <tbody>
                <tr>
                    <td class="limit-cell"><span class="limit-badge">100</span></td>
                    <td class="input-cell"><input type="text" id="games100" placeholder="турниры" inputmode="decimal"></td>
                    <td class="input-cell"><input type="text" id="ev100" placeholder="chip ev" inputmode="decimal"></td>
                </tr>
                <tr>
                    <td class="limit-cell"><span class="limit-badge">50</span></td>
                    <td class="input-cell"><input type="text" id="games50" placeholder="турниры" inputmode="decimal"></td>
                    <td class="input-cell"><input type="text" id="ev50" placeholder="chip ev" inputmode="decimal"></td>
                </tr>
                <tr>
                    <td class="limit-cell"><span class="limit-badge">25</span></td>
                    <td class="input-cell"><input type="text" id="games25" placeholder="турниры" inputmode="decimal"></td>
                    <td class="input-cell"><input type="text" id="ev25" placeholder="chip ev" inputmode="decimal"></td>
                </tr>
            </tbody>
        </table>

        <div class="result-area">
            <div class="result-label">средний chip EV</div>
            <div class="result-value" id="avgEvDisplay">—</div>
            <div class="equiv-block" id="equivDisplay"></div>
        </div>

        <div class="hypnotoad-block">
            <div class="hypnotoad-title">NIZHNY POOL</div>
        </div>
    </div>
</div>

<script>
    // DOM элементы
    const games100 = document.getElementById('games100');
    const ev100 = document.getElementById('ev100');
    const games50 = document.getElementById('games50');
    const ev50 = document.getElementById('ev50');
    const games25 = document.getElementById('games25');
    const ev25 = document.getElementById('ev25');
    const avgEvDisplay = document.getElementById('avgEvDisplay');
    const equivDisplay = document.getElementById('equivDisplay');

    let idleTimer = null;        // таймер ожидания 10 секунд
    let messageTimeout = null;   // таймер для смены/скрытия сообщений
    let currentOverlay = null;   // текущее активное полноэкранное окно

    // Функция для удаления оверлея, если есть
    function removeOverlay() {
        if (currentOverlay && currentOverlay.parentNode) {
            currentOverlay.remove();
            currentOverlay = null;
        }
        if (messageTimeout) {
            clearTimeout(messageTimeout);
            messageTimeout = null;
        }
    }

    // Показать полноэкранное сообщение на весь экран (автоматически сменит или скроет)
    function showFullscreenMessage(firstText, secondText, firstDurationSec = 6, secondDurationSec = 6) {
        // удаляем предыдущий оверлей, если есть
        removeOverlay();
        
        const overlay = document.createElement('div');
        overlay.className = 'fullscreen-message';
        overlay.innerText = firstText;
        document.body.appendChild(overlay);
        currentOverlay = overlay;
        
        // Через firstDurationSec меняем текст на secondText
        messageTimeout = setTimeout(() => {
            if (currentOverlay) {
                currentOverlay.innerText = secondText;
                // Через secondDurationSec убираем оверлей
                messageTimeout = setTimeout(() => {
                    removeOverlay();
                    messageTimeout = null;
                }, secondDurationSec * 1000);
            }
        }, firstDurationSec * 1000);
    }

    // Проверка, все ли поля заполнены (не пустые строки)
    function allFieldsFilled() {
        return games100.value.trim() !== '' && ev100.value.trim() !== '' &&
               games50.value.trim() !== '' && ev50.value.trim() !== '' &&
               games25.value.trim() !== '' && ev25.value.trim() !== '';
    }

    // Функция парсинга
    function parseNumber(value) {
        if (!value || value.trim() === '') return null; // null означает "не заполнено"
        let cleaned = value.trim().replace(',', '.');
        let num = parseFloat(cleaned);
        return isNaN(num) ? null : num;
    }

    // Основной расчёт и проверка условий для сообщения
    function updateCalc() {
        // Сбрасываем idleTimer при любом изменении
        if (idleTimer) {
            clearTimeout(idleTimer);
            idleTimer = null;
        }
        // Если показывается оверлей — сбрасываем его при изменении полей
        if (currentOverlay) {
            removeOverlay();
        }
        
        // Получаем числа (null если поле пустое)
        let g100 = parseNumber(games100.value);
        let e100 = parseNumber(ev100.value);
        let g50 = parseNumber(games50.value);
        let e50 = parseNumber(ev50.value);
        let g25 = parseNumber(games25.value);
        let e25 = parseNumber(ev25.value);
        
        // Считаем totalGames только если все значения для турниров не null и все EV не null? 
        // Но для расчёта среднего нужны только те, где есть и количество, и EV.
        // Для простоты: если в какой-то строке одно из полей пустое — игнорируем строку.
        let totalGames = 0;
        let totalEv = 0;
        
        if (g100 !== null && e100 !== null) { totalGames += g100; totalEv += g100 * e100; }
        if (g50 !== null && e50 !== null)   { totalGames += g50; totalEv += g50 * e50; }
        if (g25 !== null && e25 !== null)   { totalGames += g25; totalEv += g25 * e25; }
        
        if (totalGames === 0) {
            avgEvDisplay.innerText = '—';
            equivDisplay.innerText = '';
        } else {
            let avg = totalEv / totalGames;
            let formatted = avg.toFixed(2).replace(/\.?0+$/, '');
            if (formatted === '' || formatted === '-') formatted = avg.toFixed(2);
            avgEvDisplay.innerText = formatted;
            
            // эквивалент (только если все три строки имеют турниры? но лучше считать на основе имеющихся)
            let equiv = (g50 !== null ? g50 : 0) + 2 * (g100 !== null ? g100 : 0) + 0.5 * (g25 !== null ? g25 : 0);
            let equivText = equiv % 1 === 0 ? equiv.toFixed(0) : equiv.toFixed(2);
            equivDisplay.innerText = `Эквивалент турниров в лимите 50: ${equivText}`;
            
            // Логика для появления сообщения:
            // Условия: все шесть полей заполнены (ни одно не null) И средний EV < 15
            const allFilled = (g100 !== null && e100 !== null && g50 !== null && e50 !== null && g25 !== null && e25 !== null);
            if (allFilled && avg < 15) {
                // Запускаем таймер на 10 секунд без изменений
                idleTimer = setTimeout(() => {
                    // Проверяем повторно условия (поля могли измениться за время ожидания)
                    let g100now = parseNumber(games100.value);
                    let e100now = parseNumber(ev100.value);
                    let g50now = parseNumber(games50.value);
                    let e50now = parseNumber(ev50.value);
                    let g25now = parseNumber(games25.value);
                    let e25now = parseNumber(ev25.value);
                    let totalNow = 0, evNow = 0;
                    if (g100now !== null && e100now !== null) { totalNow += g100now; evNow += g100now * e100now; }
                    if (g50now !== null && e50now !== null) { totalNow += g50now; evNow += g50now * e50now; }
                    if (g25now !== null && e25now !== null) { totalNow += g25now; evNow += g25now * e25now; }
                    const avgNow = totalNow > 0 ? evNow / totalNow : 0;
                    const allStillFilled = (g100now !== null && e100now !== null && g50now !== null && e50now !== null && g25now !== null && e25now !== null);
                    if (allStillFilled && avgNow < 15) {
                        showFullscreenMessage("Милости прошу, к нашему шалашу", "Добро пожаловать в нижний пул", 6, 6);
                    }
                    idleTimer = null;
                }, 10000); // 10 секунд
            }
        }
    }
    
    // Обработчики событий на всех полях (сброс таймера и пересчёт)
    const allInputs = [games100, ev100, games50, ev50, games25, ev25];
    function handleInput() {
        // сброс таймера ожидания
        if (idleTimer) {
            clearTimeout(idleTimer);
            idleTimer = null;
        }
        // удаляем оверлей, если он показывается
        if (currentOverlay) {
            removeOverlay();
        }
        updateCalc();
    }
    allInputs.forEach(input => {
        input.addEventListener('input', handleInput);
        input.addEventListener('change', handleInput);
        input.addEventListener('keyup', handleInput);
    });
    
    // Инициализация
    updateCalc();
</script>
</body>
</html>
